volumes:
    langgraph-data:
        driver: local
services:
    langgraph-api:
        build: .
        ports:
            - "8001:8000"
        env_file:
            - .env
    frontend:
        build:
            context: .
            dockerfile: Dockerfile.frontend
        ports:
            - "80:80"
        depends_on:
            - langgraph-api
