volumes:
    langgraph-data:
        driver: local
services:
    langgraph-api:
        build:
            context: .
            network: host
        ports:
            - "8001:8000"
        env_file:
            - .env
        extra_hosts:
            - "host.docker.internal:host-gateway"
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ok', timeout=3)"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 30s
        dns:
            - 223.5.5.5
            - 8.8.8.8
    frontend:
        build:
            context: .
            dockerfile: Dockerfile.frontend
        ports:
            - "80:80"
        depends_on:
            langgraph-api:
                condition: service_healthy
        restart: unless-stopped
        dns:
            - 223.5.5.5
            - 8.8.8.8
