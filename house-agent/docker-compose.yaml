volumes:
    langgraph-data:
        driver: local
services:
    langgraph-api:
        build:
            context: .
            network: host
        ports:
            - "8001:8000"
        env_file:
            - .env
        extra_hosts:
            - "host.docker.internal:host-gateway"
        dns:
            - 223.5.5.5
            - 8.8.8.8
    frontend:
        build:
            context: .
            dockerfile: Dockerfile.frontend
        ports:
            - "80:80"
        depends_on:
            - langgraph-api
        dns:
            - 223.5.5.5
            - 8.8.8.8
